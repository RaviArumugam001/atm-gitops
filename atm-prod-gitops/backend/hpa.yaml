apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: django-atm-hpa
  namespace: atm-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: django-atm
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
