apiVersion: apps/v1
kind: Deployment
metadata:
  name: atm-fe
  namespace: atm-prod
  labels:
    app: atm-fe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atm-fe
  template:
    metadata:
      labels:
        app: atm-fe
    spec:
      imagePullSecrets:
        - name: docker-registry-creds
      containers:
      - name: atm-fe
        image: raviarumugam001/atm_fe_v1.0:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
