apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-backend
  namespace: atm
spec:
  replicas: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: django-backend
  template:
    metadata:
      labels:
        app: django-backend
    spec:
      imagePullSecrets:
        - name: docker-registry-creds
      containers:
        - name: django
          image: raviarumugam001/django-atm:2
          imagePullPolicy: Always
          ports:
            - containerPort: 8003
          startupProbe:
            httpGet:
              path: /health/
              port: 8003
            failureThreshold: 30
            periodSeconds: 5
      
          readinessProbe:
            httpGet:
              path: /health/
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
      
          livenessProbe:
            httpGet:
              path: /health/
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: django-config
            - secretRef:
                name: mysql-secret
          command:
            - sh
            - -c
            - |
              python manage.py migrate --noinput &&
              python manage.py runserver 0.0.0.0:8003

